<h2>Simple Test</h2>

<form onsubmit="submitTest();return false;">
<p>Q1: What is 2 + 2?</p>

<input type="radio" name="q1" value="4"> 4<br>
<input type="radio" name="q1" value="5"> 5<br><br>

<button type="submit">Submit</button>
</form>

<h3 id="result"></h3>

<script>
function submitTest(){
    let ans = document.querySelector('input[name="q1"]:checked');
    if(ans && ans.value === "4"){
        result.innerText = "Correct ✅";
    } else {
        result.innerText = "Wrong ❌";
    }
}
</script>
